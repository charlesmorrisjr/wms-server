version: '3.8'

services:
  wms-db:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: always
    environment:
      POSTGRES_USER: wms_admin
      POSTGRES_PASSWORD: wms_server_password
      POSTGRES_DB: wms
    ports:
      - "5432:5432"
    volumes:
      - wms-db-data:/var/lib/postgresql/data

volumes:
  wms-db-data:
